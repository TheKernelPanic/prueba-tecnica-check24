version: "3.9"

services:

    php:
        build:
            context: ./.docker
            dockerfile: Dockerfile
        container_name: check24_webapp_fpm
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - db
        networks:
            - check24_app_network

    nginx:
        image: nginx:latest
        container_name: check24_webapp_nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - check24_app_network

    db:
        image: mariadb:11
        container_name: check24_webapp_db
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: check24_db
            MYSQL_USER: check24_usr
            MYSQL_PASSWORD: check24_pass
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - check24_app_network

volumes:
    db_data:

networks:
    check24_app_network:
